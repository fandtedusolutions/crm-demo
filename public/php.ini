; PHP Configuration for CRM Demo - supports Call Tracker recordings up to 25 MB
; Upload settings
upload_max_filesize = 25M
post_max_size = 28M
max_file_uploads = 20

; Execution settings
max_execution_time = 300
max_input_time = 300
memory_limit = 256M

; Error reporting (for development)
display_errors = On
error_reporting = E_ALL

; Additional settings for large file handling
max_input_vars = 3000
max_input_nesting_level = 64
